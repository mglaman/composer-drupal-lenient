name: Integration
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  verify:
    runs-on: "ubuntu-latest"
    name: "verify"
    strategy:
      matrix:
        drupal:
          - "^10"
          - "^11"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v2"
      - name: "Install PHP"
        uses: "shivammathur/setup-php@v2"
        with:
          coverage: none
          php-version: 8.1
          tools: composer:v2
          extensions: dom, curl, libxml, mbstring, zip, pdo, mysql, pdo_mysql, bcmath, gd, exif, iconv
      - name: Setup Drupal
        uses: bluehorndigital/setup-drupal@v1.0.4
        with:
          version: "${{ matrix.drupal }}"
          path: ~/drupal
          allow_plugins: |
            drupal/core-composer-scaffold
            drupal/core-project-message
            mglaman/composer-drupal-lenient
      - name: Require self
        run: |
          cd ~/drupal
          composer require mglaman/composer-drupal-lenient *@dev
      - name: Configure allowed list
        run: |
          cd ~/drupal
          composer config --merge --json extra.drupal-lenient.allowed-list '["drupal/token"]'
      - name: Add non-compatible module release
        run: |
          cd ~/drupal
          composer require drupal/token:1.10.0 -W
          composer show drupal/token
  purge:
    runs-on: "ubuntu-latest"
    name: "purge#1342bb92"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v2"
      - name: "Install PHP"
        uses: "shivammathur/setup-php@v2"
        with:
          coverage: none
          php-version: 8.1
          tools: composer:v2
          extensions: dom, curl, libxml, mbstring, zip, pdo, mysql, pdo_mysql, bcmath, gd, exif, iconv
      - name: Setup Drupal
        uses: bluehorndigital/setup-drupal@v1.0.4
        with:
          version: ^10
          path: ~/drupal
          allow_plugins: |
            mglaman/composer-drupal-lenient
      - name: Require self
        run: |
          cd ~/drupal
          composer require mglaman/composer-drupal-lenient *@dev
      - name: Configure allowed list
        run: |
          cd ~/drupal
          composer config --merge --json extra.drupal-lenient.allowed-list '["drupal/purge"]'
      - name: Add non-compatible module release
        run: |
          cd ~/drupal
          composer require drupal/purge:3.x-dev#1342bb92b5304c6c316357d2c2c71a62a34d3eff -W
          composer show drupal/purge
  d9_to_d10:
    runs-on: "ubuntu-latest"
    name: "D9 to D10"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v2"
      - name: "Install PHP"
        uses: "shivammathur/setup-php@v2"
        with:
          coverage: none
          php-version: 8.1
          tools: composer:v2
          extensions: dom, curl, libxml, mbstring, zip, pdo, mysql, pdo_mysql, bcmath, gd, exif, iconv
      - name: Setup Drupal
        uses: bluehorndigital/setup-drupal@v1.0.4
        with:
          version: ^9
          path: ~/drupal
          allow_plugins: |
            mglaman/composer-drupal-lenient
      - name: Allow insecure packages for Drupal 9 testing
        run: |
          cd ~/drupal
          composer config --json audit '{"block-insecure": false}'
      - name: Require self
        run: |
          cd ~/drupal
          composer require mglaman/composer-drupal-lenient *@dev
      - name: Configure allowed list
        run: |
          cd ~/drupal
          composer config --merge --json extra.drupal-lenient.allowed-list '["drupal/purge"]'
      - name: Add module release
        run: |
          cd ~/drupal
          composer require drupal/purge:3.x-dev#1342bb92b5304c6c316357d2c2c71a62a34d3eff -W
          composer show drupal/purge
      - name: Upgrade Drupal
        run: |
          cd ~/drupal
          composer require drupal/core-recommended:^10 drupal/core-dev:^10 drupal/core-composer-scaffold:^10 drupal/core-project-message:^10 --with-all-dependencies --no-update
          composer update --no-progress --prefer-dist
      - name: Show module
        run: |
          cd ~/drupal
          composer show drupal/purge
  without_lock_file:
    runs-on: "ubuntu-latest"
    name: "without lock file"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v2"
      - name: "Install PHP"
        uses: "shivammathur/setup-php@v2"
        with:
          coverage: none
          php-version: 8.1
          tools: composer:v2
          extensions: dom, curl, libxml, mbstring, zip, pdo, mysql, pdo_mysql, bcmath, gd, exif, iconv
      - name: Setup Drupal
        uses: bluehorndigital/setup-drupal@v1.0.4
        with:
          version: "^10"
          path: ~/drupal
          allow_plugins: |
            drupal/core-composer-scaffold
            drupal/core-project-message
            mglaman/composer-drupal-lenient
      - name: Require self
        run: |
          cd ~/drupal
          composer require mglaman/composer-drupal-lenient *@dev
      - name: Configure allowed list
        run: |
          cd ~/drupal
          composer config --merge --json extra.drupal-lenient.allowed-list '["drupal/token"]'
      - name: Remove lock file
        run: |
          cd ~/drupal
          rm composer.lock
          rm -rf vendor
      - name: Require self globally
        run: |
          cd ~/drupal
          composer global config --no-plugins allow-plugins.mglaman/composer-drupal-lenient true
          composer global require mglaman/composer-drupal-lenient *@dev
      - name: Add non-compatible module release
        run: |
          cd ~/drupal
          composer require drupal/token:1.10.0 -W
          composer show drupal/token
